history:
  - date: "Декабрь 2023"
    text: "Создан GDPS Spherium, работа над ним шла просто по приколу и рассчитывался на пару человек, вторым модератором на тот момент был Пансан. Цель: опробовать себя в роли модератора Geometry Dash. Из себя приватка представляла буквально ничего - панель FruitSpace и обыкновенный клиент. Позднее были добавлены некоторые базовые модификации для главной менюшки"

  - date: "Январь - февраль 2024"
    text: "Пансан был снят с поста модератора. Клиент GDPS был обновлён до 2.2. 25 февраля приватный сервер был остановлен"

  - date: "Апрель 2024"
    text: "Приватка объявила о возобновлении своей работы. Помимо Windows клиент также появился на Android и iOS. Была куплена реклама в Telegram канале GD News, пришло много людей. Появились первые челленджлист и демонлист в виде форума на Discord сервере. Был объявлен набор модераторов, к тому времени приватка подобралась к 40 месту в топе FruitSpace. В конце апреля были объявлены кандидаты в модераторы GDPS Spherium. Andromeda победил в голосовании за звание старшего модератора, DogDay победила в голосовании за звание младшего модератора."

  - date: "Июнь - июль 2024"
    text: "Был сделан свой сайт, а также сделан отдельный сайт для листов. 7 июля GDPS Spherium приостановил свою работу, перед закрытием был разоблочён один из викторов приватки - Nurzet, он был обвинён в хаках уровней гд ботом. Почему то Кемпер (я) через пару дней объявил о реопенинге приватки. Но планы обломались, приватка не открылась по личным причинам владельца (меня)."

  - date: "Декабрь 2024"
    text: "На радары интернета вернулся Кемпер. Он заявил что готовит реопенинг приватки и готов вернуться в ближайшее время"

  - date: "Март - апрель 2025"
    text: "Анонсирован реопенинг приватки со всеми обновлениями. Приватка открылась 21 марта 2024 года. 24 марта была куплена реклама в GD News, с неё на этот раз пришло очень много людей, хоть и не сразу. 28 марта у GDPS Spherium стукнуло 50 подписчиков в Telegram канале. 7 апреля FruitSpace объявил о реструктуризации хостинга. И я в тот момент предсказал закрытие хостинга, т. к. обсуждал незадолго хостинг с его бывшим админом - KilDoom'ом. Он сказал что Майден (владелец хостинга) давно планировал закрыть хостинг, и что он возможно скоро закроется под предлогом поломки. Я сразу же запросил бекап базы данных у Майдена. Ну и пророчество сбылось - 18 апреля в новостях хостинга было заявлено что вся его база была утеряна из-за технической неисправности, позднее хостинг был закрыт. Мы успели за пару дней до этого переехать на другой хостинг - GDPSFH"

  - date: "Май - август 2025"
    text: "14 мая на Discord сервере стукнуло 100 участников. К 14 августа на приватке уже было зарегистрировано 200+ аккаунтов и выложено 100+ уровней. 14 августа также появились новые самописные демонлист и челленджлист. 29 августа объявлено очередное закрытие, уже без реопенингов и тому подобного"

  - date: "Сентябрь - ноябрь 2025"
    text: "7 сентября право на владение приваткой было передано младшему модератору demolena. Им мог бы быть Andromeda, но он отказался от данной роли. Позднее роль вернулась к Кемперу, т. к. demolena ничего не сделал за время того как был владельцем приватки. Про пиар я ничего не говорю, в этом плане demolena большой молодец, и я за это ему благодарен. При этом приватка стала работать в автономном режиме - её больше никто не модерирует и ей больше никто не занимается из модер состава, но сам сервер работает по сей день"

