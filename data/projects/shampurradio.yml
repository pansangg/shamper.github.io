history:
  - date: "Апрель - август 2025"
    text: "У меня был личный сайт био, ещё старый. На него в раздел приколов я добавил RandomRadio - плеер с рандомной музыкой. Чистейшая болванка - кнопка паузы и следующего трека. Чуть позже добавлено было больше кнопок управлением музыкой, появился первый прототип Vibe Mode - на треках C418 сайт окрашивался в фиолетовые цвета, также плеер был переименован в привычный нам ShampurRadio. Примерно в июле - августе жёстко был обновлён плеер - добавлено множество кнопочек для управления, обложка, регулировка громкости, прокачен Vibe Mode - теперь он умел красить сайт в цвета обложки трека"

