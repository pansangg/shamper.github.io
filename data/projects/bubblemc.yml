history:
  - date: "Весна 2024"
    text: "31 марта было объявлено о разработке сервера BubbleMC. Сначала сервер задумывался как приватное выживание. Два админа: Кемпер и Пансан. Позднее Пансан будет снят с этой должности. В мае сервер открылся. Было доступно 25 бесплатных мест на сервер, а также можно было купить проходку за 49р. Всё таки все 25 бесплатных мест разобрали"

  - date: "Лето 2024"
    text: "18 июля начался второй сезон сервера, и в тот момент в планах было добавить кастомную еду. Пансан вернулся на пост админа сервера. На тот момент было желание начать разработку нового BubbleMC с мини-играми. 14 августа было объявлено о закрытии сервера из-за семейных причин у админа (Кемпера). 20 августа было положено начало разработке новой сборки BubbleMC. 31 августа временно были прекращены работы над новой сборкой"

  - date: "Зима - весна 2025"
    text: "6 января работа над новой сборкой была возобновлена. 13 января был собран хост для сервера. В мае разработка сервера началась в разы активнее"

  - date: "Лето 2025"
    text: "В июне - июле период гипер активной разработки сервера. 1 августа состоялось открытие нового BubbleMC, но позднее 11 августа сервер прикрылся"

  - date: "Осень 2025"
    text: "13 октября создан блог на teletype. 18 октября сервер продолжил свою работу, но выключался по ночам. вместе с открытием пришёл ивент Хеллоуин 2025. 22 октября пост администратора покинул Пансан. Единственным админом остался Кемпер. 25 октября открылся новый режим - скай пвп. 5 ноября завершился ивент Хеллоуин 2025. 14 ноября был анонсирован новый режим - фермер тайкун. по сути уникальный режим среди всех серверов Minecraft, плагин для него был собственной разработки. А уже 15 ноября режим был открыт для всех, позднее была добавлена музыка и темы для тайкуна. 22 ноября был написан собственный сайт для сервера, 24 ноября он был отшлифован до идеала"

  - date: "Декабрь 2025 - январь 2026"
    text: "Началась разработка новогоднего ивента к 2026 году. Началась работа по бартеру со стримером LuckyMan. 16 декабря стартовал новогодний ивент - за 70 ракушек (донат валюта сервера) можно было купить пропуск в адвент календарь, в нём давали подарки каждый день с начала ивента до 1 января. также в ивенте был новогодний бандл с уникальными шляпками, ну и был добавлен новогодний ивент остров чтобы посидеть перед костром пообщаться. в конце декабря было отключено сохранение эндер-сундука при ребитхе на тайкуне, ещё позднее случилась волна банов, под раздачу попали игроки пришедшие от LuckyMan'а за оскорбления. 11 января окончился новогодний ивент. 5 февраля сервер объявил о своём закрытии на неопределённый срок. основные причины: выгорание от сервера и игры, события из жизни, а также постоянные споры с LuckyMan'ом, с ним не выходило нормально сработаться"

