history:
  - date: "Февраль 2026"
    text: "Начата разработка termos. Изначально это был проект по приколу, просто опробовать в деле Claude Sonnet 4.6. Но в процессе мессенджер начал иметь свой вид и функционал, и я решил продолжать его разработку. Позднее был создан Telegram канал для новостей проекта (да знаю странно, но так было удобнее всего). Были добавлены подарки как в Telegram. Позже был открыт набор на бета-тестирование. Кемпер продолжал добавлять кучу фич"

  - date: "Март 2026"
    text: "Дошлифована система комментариев к постам, переработано окно для отправки поста, полностью переработан дизайн на современный. Зародился новый локальный мемасик - [Не удалось расшифровать]. Позже вышло масштабное обновление которое принесло в termos опросы в постах, были обновлены настройки интерфейса и можно было теперь смотреть страницы профилей пользователей и каналов даже не авторизированным пользователям. Далее вышел масштабный фикс. Вышло опять обновление направленное на конфинденциальнось пользователей - добавлены настройки конфинденциальности"

  - date: "Апрель 2026"
    text: "И ещё одно крупное обновление - групповые чаты, пагинация чата, заработок валюты мессенджера (бесплатные подарки каждый день, реферальная система). Перед открытием были внесены изменения в экономику мессенджера - ребренд валюты, обесценивание старых NFT подарков, ну и бонусом pansangg и zom1nt проспонсировали покупку домена для мессенджера. И вот 5 апреля состоялось открытие мессенджера для всех. 11 апреля была анонсирована подписка orbium дающая косметические перки для пользователей. Но к сожалению, 16 апреля, было объявлено о прекращении поддержки termos. В основном это связано с выгоранием и событиями в жизни владельца мессенджера"

