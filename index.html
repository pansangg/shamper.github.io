    <script>
        const title = document.querySelector(".made-with-love");

        title.addEventListener("mousemove", (e) => {
            const rect = title.getBoundingClientRect();

            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            title.style.setProperty("--x", `${x}%`);
            title.style.setProperty("--y", `${y}%`);
        });
    </script>
    <script>
        document.addEventListener("mousemove", (e) => {
            const link = e.target.closest(".log-repo-link");

            if (!link) return;

            const rect = link.getBoundingClientRect();

            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            link.style.setProperty("--x", `${x}%`);
            link.style.setProperty("--y", `${y}%`);
        });
    </script>
    <script>
        document.addEventListener("click", (e) => {
            const card = e.target.closest(".social-bttn");

            if (!card) return;

            const link = card.dataset.link;
            if (link) {
                window.location.href = link;
            }
        });
    </script>
